services:
  mysql-server:
    image: mysql:8
    container_name: mysql-server
    environment:
      MYSQL_ROOT_PASSWORD: 3lGigante2026?
      MYSQL_DATABASE: example
      MYSQL_USER: user
      MYSQL_PASSWORD: 3lGigante2026?
    ports:
      - "3306:3306"
    networks:
      - mysql-network

  mysql-client:
    image: phpmyadmin
    container_name: mysql-client
    environment:
      PMA_HOST: mysql-server
      PMA_USER: user
      PMA_PASSWORD: 3lGigante2026?
    ports:
      - "8080:80"
    networks:
      - mysql-network

networks:
  mysql-network:
    driver: bridge
    name: mysql-network